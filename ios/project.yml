name: TuneBridge
options:
  bundleIdPrefix: com.tunebridge
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  xcodeVersion: "15"
  generateEmptyDirectories: true

packages: {}

targets:
  TuneBridge:
    type: application
    platform: iOS
    sources:
      - path: TuneBridge
    info:
      path: TuneBridge/Resources/Info.plist
      properties:
        CFBundleDisplayName: TuneBridge
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        CFBundleURLTypes: []
        UIBackgroundModes:
          - audio
        NSLocalNetworkUsageDescription: "TuneBridge needs local network access to sync music from your Mac."
        NSBonjourServices:
          - _tunebridge._tcp
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchStoryboardName: LaunchScreen
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tunebridge.ios
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

<body class="bg-bg-deep text-text-primary min-h-screen flex items-center justify-center p-6">
<div class="fixed inset-0 z-0">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary-container/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-secondary-container/10 rounded-full blur-[120px]"></div>

<!-- Header -->
<header class="p-[20px_24px_12px] flex items-center gap-6 border-b border-border-soft">
<div class="w-14 h-14 bg-success/20 border border-success/30 rounded-xl flex items-center justify-center">
<span class="material-symbols-outlined text-success text-[32px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<div class="flex flex-col">
<span class="font-modal-step-eyebrow text-modal-step-eyebrow text-primary/60 uppercase tracking-widest">Step 5 of 5</span>
<h1 class="font-h-modal-title text-h-modal-title text-text-primary leading-tight">Sync Complete</h1>
<p class="font-h-modal-subtitle text-h-modal-subtitle text-text-secondary">Your library is now up to date.</p>
</div>
</header>
<!-- Body -->
<div class="p-[24px] space-y-6">
<!-- Hero Image / Visual Confirmation -->
<!-- Bento Summary Grid -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
<div class="bg-surface-1 p-4 rounded-xl border border-border-soft flex flex-col gap-1">

</div>
<div class="bg-surface-2 p-4 rounded-xl border border-border-soft flex flex-col gap-1">
<span class="material-symbols-outlined text-primary mb-2">label</span>
<span class="font-stat-number text-stat-number text-text-primary">856</span>
<span class="font-caption text-caption text-text-muted">Tags Updated</span>
</div>
<div class="bg-surface-3 p-4 rounded-xl border border-border-soft flex flex-col gap-1">

<span class="font-caption text-caption text-text-muted">Space Saved</span>
</div>
</div>

</div>
<span class="font-caption text-caption text-text-muted">Verified</span>
</div>
<div class="flex justify-between items-center py-2 border-b border-white/5">
<div class="flex items-center gap-3">

</div>

</div>
<div class="flex justify-between items-center py-2">

</div>

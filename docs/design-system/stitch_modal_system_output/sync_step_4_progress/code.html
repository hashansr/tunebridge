<style>
        body {
            background-color: #070A10;
            font-family: 'Manrope', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;

<body class="bg-bg-deep overflow-hidden p-6">
<!-- Modal Container (Medium Tier: 760px) -->
<div class="glass-modal w-full max-w-[760px] rounded-xl overflow-hidden relative border border-border-soft">
<!-- Header Section -->

</div>
<div class="flex flex-col">
<span class="font-modal-step-eyebrow text-modal-step-eyebrow text-secondary uppercase">Step 4 of 5</span>
<h1 class="font-h-modal-title text-h-modal-title text-text-primary">Syncing Tracks</h1>
<p class="font-h-modal-subtitle text-h-modal-subtitle text-text-muted">Transferring and updating your library.</p>
</div>
</header>
<!-- Body Section -->
<main class="p-[24px_24px_32px] space-y-xl">
<!-- Overall Status Card -->
<div class="bg-surface-1 rounded-xl p-xl border border-border-soft flex flex-col gap-md">
<div class="flex justify-between items-end">
<div>
<span class="font-section-label text-section-label text-text-muted block mb-1">GLOBAL PROGRESS</span>
<div class="font-stat-number text-stat-number text-primary-fixed">72%</div>
</div>
<div class="text-right">
<span class="font-body-sm text-body-sm text-success flex items-center gap-1 justify-end">
<span class="material-symbols-outlined text-sm" data-icon="check_circle">check_circle</span>
                            2,480 of 3,445 items
                        </span>
<span class="font-caption text-caption text-text-muted">Estimated time: 4m 12s</span>
</div>
</div>
<div class="h-2 w-full bg-white/5 rounded-full overflow-hidden">
<div class="h-full bg-primary-fixed w-[72%] progress-glow transition-all duration-500"></div>
</div>
</div>
<!-- Detailed Batches -->
<div class="space-y-lg">
<h3 class="font-section-label text-section-label text-text-muted">ACTIVE WORKFLOWS</h3>
<!-- Batch 1: Transferring -->
<div class="bg-surface-2 p-lg rounded-lg border border-border-soft flex items-center gap-lg">
<div class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-secondary">
<span class="material-symbols-outlined" data-icon="cloud_upload">cloud_upload</span>
</div>
<div class="flex-1 space-y-xs">

</div>
<div class="h-1.5 w-full bg-white/5 rounded-full overflow-hidden">
<div class="h-full bg-secondary w-[94%] transition-all"></div>
</div>
</div>
</div>

</div>

</div>

<div class="flex-1 space-y-xs">
<div class="flex justify-between font-body-sm text-body-sm">

</div>
<div class="h-1.5 w-full bg-white/5 rounded-full overflow-hidden">

<button class="px-6 py-2.5 rounded-full bg-primary-container text-on-primary-container font-body-sm font-bold opacity-50 cursor-not-allowed">
